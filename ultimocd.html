<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  font-size: 20px;
}

#terminal {
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background: transparent; }
}

img {
  margin-top: 30px;
  max-width: 300px;
}
</style>
</head>

<body>

<div id="terminal"></div><span class="cursor"></span>

<audio id="teclado" src="https://www.myinstants.com/media/sounds/keyboard.mp3"></audio>

<script>
const terminal = document.getElementById("terminal");
const som = document.getElementById("teclado");

const mensagens = [
  "C:\\Users\\Usuario> iniciando sistema...",
  "Acessando rede....",
  "",
  "Oiie tudo bem ?..",
  "",
  "Não clique em links desconhecidos ta ?...",
  "",
  "Carregando mensagem final..."
];

let linha = 0;
let char = 0;

function digitar() {
  if (linha < mensagens.length) {
    if (char < mensagens[linha].length) {
      terminal.innerHTML += mensagens[linha].charAt(char);
      char++;

      // som de digitação (bem leve)
      som.currentTime = 0;
      som.play();

      // velocidade variável (mais realista)
      let velocidade = Math.random() * 40 + 10;

      setTimeout(digitar, velocidade);
    } else {
      terminal.innerHTML += "\n";
      linha++;
      char = 0;
      setTimeout(digitar, 1200);
    }
  } else {
    suspenseFinal();
  }
}

function suspenseFinal() {
  setTimeout(() => {
    mostrarImagem();
  }, 2000);
}

function mostrarImagem() {
  const img = document.createElement("img");
  img.src = "https://i.imgur.com/lYHGdRx.jpeg";
  document.body.appendChild(img);
}

digitar();
</script>

</body>
</html>
