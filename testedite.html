<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  font-size: 20px;
  overflow: hidden;
}

#terminal {
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background: transparent; }
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div id="terminal"></div><span class="cursor"></span>

<audio id="teclado" src="https://www.myinstants.com/media/sounds/keyboard.mp3"></audio>

<script>
const terminal = document.getElementById("terminal");
const som = document.getElementById("teclado");

const mensagens = [
  "C:\\Users\\Usuario> iniciando sistema...",
  "Acessando rede....",
  "",
  "Oiie tudo bem ?..",
  "",
  "Não clique em links desconhecidos ta ?...",
  "",
  "Carregando mensagem final..."
];

let linha = 0;
let char = 0;

function digitar() {
  if (linha < mensagens.length) {
    if (char < mensagens[linha].length) {
      terminal.innerHTML += mensagens[linha].charAt(char);
      char++;

      // som de digitação
      som.currentTime = 0;
      som.play();

      let velocidade = Math.random() * 40 + 10;
      setTimeout(digitar, velocidade);

    } else {
      terminal.innerHTML += "\n";
      linha++;
      char = 0;
      setTimeout(digitar, 1200);
    }
  } else {
    glitchFinal();
  }
}

function glitchFinal() {
  document.body.style.transition = "0.1s";

  let count = 0;

  let intervalo = setInterval(() => {
    document.body.style.background = (count % 2 === 0) ? "black" : "darkred";
    count++;

    if (count > 10) {
      clearInterval(intervalo);
      mostrarVideo();
    }
  }, 80);
}

function mostrarVideo() {
  document.body.innerHTML = "";

  const video = document.createElement("video");
  video.src = "https://i.imgur.com/itZm5FP.mp4";
  video.autoplay = true;
  video.muted = true;
  video.loop = false;

  document.body.appendChild(video);

  // tenta colocar em tela cheia
  video.requestFullscreen?.();
}

digitar();
</script>

</body>
</html>
