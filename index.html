<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  font-size: 20px;
}

#terminal {
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background: transparent; }
}

img {
  margin-top: 30px;
  max-width: 300px;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const mensagens = [
  "Acessando rede....",
  "",
  "Oiie tudo bem ?..",
  "",
  "Não clique em links desconhecidos ta ?...",
  "",
  "Carregando......"
];

let linha = 0;
let char = 0;

function digitar() {
  if (linha < mensagens.length) {
    if (char < mensagens[linha].length) {
      terminal.innerHTML += mensagens[linha].charAt(char);
      char++;
      setTimeout(digitar, 20);
    } else {
      terminal.innerHTML += "\n";
      linha++;
      char = 0;
      setTimeout(digitar, 1500); // ⏳ intervalo de 1 segundos
    }
  } else {
    mostrarImagem();
  }
}

function mostrarImagem() {
  const img = document.createElement("img");
  img.src = "https://i.imgur.com/lYHGdRx.jpeg"; // você pode trocar depois
  document.body.appendChild(img);
}

digitar();
</script>

</body>
</html>
